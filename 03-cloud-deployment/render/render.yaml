# ============================================================
# render.yaml — Infrastructure as Code cho Render
#
# Docs: https://render.com/docs/blueprint-spec
# Commit file này vào git → Render tự sync infrastructure.
# ============================================================

services:
  - type: web
    name: ai-agent
    runtime: python
    region: singapore
    plan: free

    rootDir: 03-cloud-deployment/render
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AGENT_API_KEY
        generateValue: true

  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru

# ============================================================
# Cách deploy:
#   1. Push code lên GitHub
#   2. Render Dashboard → New → Blueprint
#   3. Connect repo → Render đọc render.yaml này
#   4. Review và Deploy
# ============================================================
